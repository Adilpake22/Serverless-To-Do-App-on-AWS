<!DOCTYPE html>
<html>
<head>
  <title>To-Do App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      padding: 10px 15px;
      margin-left: 5px;
      border: none;
      border-radius: 5px;
      background: #667eea;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f3f3f3;
      margin: 8px 0;
      padding: 10px;
      border-radius: 5px;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">
  <h2> To-Do App</h2>

  <input id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>
</div>

<script>
const API_URL = "https://988r89akel.execute-api.ap-southeast-2.amazonaws.com/dev";

// Add Task
async function addTask() {
  const input = document.getElementById("taskInput");
  const task = input.value.trim();

  if (!task) {
    alert("Enter task");
    return;
  }

  await fetch(API_URL + "/tasks", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ task })
  });

  input.value = "";
  loadTasks();
}

// Load Tasks
async function loadTasks() {
  const res = await fetch(API_URL + "/tasks");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((t) => {
    const li = document.createElement("li");
    li.textContent = t.task || t.id;
    list.appendChild(li);
  });
}

window.onload = loadTasks;
</script>


 

</body>
</html>
